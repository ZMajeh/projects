<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Anand Lodge Management</title>
        <link rel="rust" data-trunk href="Cargo.toml"/>
        <style>
            :root {
                --primary: #2c3e50;
                --accent: #27ae60;
                --sidebar-bg: #f8f9fa;
                --bg: #ffffff;
                --text: #2c3e50;
                --sidebar-width: 260px;
            }
            body {
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                margin: 0;
                background-color: var(--bg);
                color: var(--text);
                height: 100vh;
            }
            .app-layout {
                display: flex;
                height: 100vh;
                position: relative;
            }
            .sidebar {
                width: var(--sidebar-width);
                background-color: var(--sidebar-bg);
                border-right: 1px solid #ddd;
                display: flex;
                flex-direction: column;
                transition: transform 0.3s ease;
                z-index: 1001;
            }
            @media (max-width: 768px) {
                .sidebar {
                    position: absolute;
                    left: 0; top: 0; bottom: 0;
                    transform: translateX(-100%);
                }
                .sidebar.open { transform: translateX(0); }
                .sidebar-overlay {
                    display: none;
                    position: fixed;
                    top: 0; left: 0; right: 0; bottom: 0;
                    background: rgba(0,0,0,0.4);
                    z-index: 1000;
                }
                .sidebar-overlay.show { display: block; }
            }
            .nav-link {
                color: #5d6d7e;
                text-decoration: none;
                padding: 1rem 1.5rem;
                font-weight: 600;
                border-left: 4px solid transparent;
                transition: all 0.2s;
            }
            .nav-link:hover { background: #edf2f4; color: var(--primary); }
            .nav-link.active {
                background-color: #edf2f4;
                color: var(--primary);
                border-left-color: var(--primary);
            }
            .content {
                flex: 1;
                padding: 1.5rem;
                overflow-y: auto;
                width: 100%;
            }
            .mobile-header {
                display: none;
                background: white;
                padding: 0.8rem 1rem;
                border-bottom: 1px solid #ddd;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 900;
            }
            @media (max-width: 768px) {
                .mobile-header { display: flex; }
            }
            .card {
                background: white;
                padding: 1.5rem;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                margin-bottom: 1.5rem;
                border: 1px solid #eee;
            }
            .grid-form {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            @media (max-width: 600px) {
                .grid-form { grid-template-columns: 1fr; }
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 1rem;
            }
            th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
            td { padding: 12px; border-bottom: 1px solid #eee; }
            button {
                padding: 0.8rem 1.5rem;
                font-weight: 600;
                background-color: var(--primary);
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                transition: opacity 0.2s;
            }
            button:hover { opacity: 0.9; }
            button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
            input, select {
                padding: 0.8rem;
                border: 1px solid #dcdde1;
                border-radius: 8px;
                width: 100%;
                font-size: 1rem;
            }
            input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(44,62,80,0.1); }
        </style>
        <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    </head>
    <body>
        <div id="main"></div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
            import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
            import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

            const firebaseConfig = {
                apiKey: "AIzaSyB_UNAaB6Enl87Yiw3zQONsjqITtYKKP_Y",
                authDomain: "lodge-management-a4cc9.firebaseapp.com",
                projectId: "lodge-management-a4cc9",
                storageBucket: "lodge-management-a4cc9.firebasestorage.app",
                messagingSenderId: "539473298830",
                appId: "1:539473298830:web:47ad1798d66207b22150df",
                measurementId: "G-V79GBCVV8F"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            const cleanData = (obj) => {
                if (!obj || typeof obj !== 'object') return {};
                const newObj = {};
                Object.keys(obj).forEach(key => {
                    if (obj[key] !== undefined && obj[key] !== null) newObj[key] = obj[key];
                });
                return newObj;
            };

            // --- AUTH BRIDGE ---
            window.loginUser = async (email, password) => {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                return { email: userCredential.user.email, uid: userCredential.user.uid };
            };

            window.signOutUser = async () => {
                await signOut(auth);
                return true;
            };

            // --- ROOM BRIDGE ---
            window.getRooms = async () => {
                console.log("Database: Fetching rooms...");
                const q = query(collection(db, "rooms"), orderBy("number"));
                const querySnapshot = await getDocs(q);
                const rooms = [];
                querySnapshot.forEach((doc) => { rooms.push({ id: doc.id, ...doc.data() }); });
                return rooms;
            };

            window.addRoom = async (room) => {
                console.log("Firestore: addRoom", room);
                try {
                    const data = { ...cleanData(room), createdAt: serverTimestamp() };
                    const docRef = await addDoc(collection(db, "rooms"), data);
                    console.log("Firestore: addRoom success", docRef.id);
                    return docRef.id;
                } catch (e) {
                    console.error("Firestore: addRoom error", e);
                    throw e;
                }
            };

            window.updateRoom = async (id, room) => {
                console.log("Firestore: updateRoom", id, room);
                try {
                    const data = { ...cleanData(room), updatedAt: serverTimestamp() };
                    await updateDoc(doc(db, "rooms", id), data);
                    return true;
                } catch (e) {
                    console.error("Firestore: updateRoom error", e);
                    throw e;
                }
            };

            window.deleteRoom = async (id) => {
                await deleteDoc(doc(db, "rooms", id));
                return true;
            };

            // --- CUSTOMER BRIDGE ---
            window.getCustomers = async (searchTerm = "") => {
                console.log(`Database: getCustomers("${searchTerm}")`);
                try {
                    let q;
                    if (searchTerm) {
                        q = query(collection(db, "customers"), 
                            where("full_name", ">=", searchTerm),
                            where("full_name", "<=", searchTerm + "\uf8ff"),
                            limit(20));
                    } else {
                        q = query(collection(db, "customers"), limit(20));
                    }
                    const snap = await getDocs(q);
                    const customers = [];
                    snap.forEach((doc) => { customers.push({ id: doc.id, ...doc.data() }); });
                    console.log(`Database: Found ${customers.length} guests`);
                    return customers;
                } catch (e) {
                    console.error("Database: getCustomers error", e);
                    throw e;
                }
            };

            window.addCustomer = async (customer) => {
                console.log("Firestore: addCustomer", customer);
                const docRef = await addDoc(collection(db, "customers"), { ...cleanData(customer), createdAt: serverTimestamp() });
                return docRef.id;
            };

            window.updateCustomer = async (id, customer) => {
                await updateDoc(doc(db, "customers", id), { ...cleanData(customer), updatedAt: serverTimestamp() });
                return true;
            };

            window.deleteCustomer = async (id) => {
                await deleteDoc(doc(db, "customers", id));
                return true;
            };

            // --- BOOKING BRIDGE ---
            window.getBookings = async () => {
                console.log("Database: Fetching bookings...");
                try {
                    const q = query(collection(db, "bookings"), orderBy("checkInDate", "desc"), limit(50));
                    const snap = await getDocs(q);
                    const bookings = [];
                    snap.forEach((doc) => { bookings.push({ id: doc.id, ...doc.data() }); });
                    return bookings;
                } catch (e) {
                    console.warn("Database: getBookings fallback (index likely building)");
                    const q = query(collection(db, "bookings"), limit(50));
                    const snap = await getDocs(q);
                    const bookings = [];
                    snap.forEach((doc) => { bookings.push({ id: doc.id, ...doc.data() }); });
                    return bookings;
                }
            };

            window.addBooking = async (booking) => {
                console.log("Firestore: addBooking", booking);
                const docRef = await addDoc(collection(db, "bookings"), { ...cleanData(booking), createdAt: serverTimestamp() });
                if (booking.roomId) {
                    await updateDoc(doc(db, "rooms", booking.roomId), { status: "Occupied" });
                }
                return docRef.id;
            };

            window.updateBooking = async (id, booking) => {
                await updateDoc(doc(db, "bookings", id), { ...cleanData(booking), updatedAt: serverTimestamp() });
                return true;
            };

            window.deleteBooking = async (id, roomId) => {
                await deleteDoc(doc(db, "bookings", id));
                if (roomId) {
                    await updateDoc(doc(db, "rooms", roomId), { status: "Available" });
                }
                return true;
            };

            // --- UTILS ---
            window.startCamera = async (id) => {
                const video = document.getElementById(id);
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = stream;
                video.play();
                window._currentStream = stream;
                return true;
            };

            window.stopCamera = async () => {
                if (window._currentStream) { window._currentStream.getTracks().forEach(t => t.stop()); }
                return true;
            };

            window.takeSnapshot = async (id) => {
                const video = document.getElementById(id);
                const canvas = document.createElement("canvas");
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext("2d").drawImage(video, 0, 0);
                return canvas.toDataURL("image/jpeg", 0.7);
            };

            window.readFileAsDataURL = async (file) => {
                return new Promise((res, rej) => {
                    const reader = new FileReader();
                    reader.onload = () => res(reader.result);
                    reader.onerror = rej;
                    reader.readAsDataURL(file);
                });
            };

            window.extractAadhaar = async (img) => {
                const worker = await Tesseract.createWorker('eng');
                const { data: { text } } = await worker.recognize(img);
                await worker.terminate();
                let idMatch = text.match(/\d{4}\s\d{4}\s\d{4}/);
                let aadhaar = idMatch ? idMatch[0].replace(/\s/g, '') : (text.match(/\d{12}/) || [null])[0];
                let dob = (text.match(/\d{2}\/\d{2}\/\d{4}/) || [null])[0];
                let gender = text.toUpperCase().includes("FEMALE") ? "Female" : "Male";
                return { aadhaar, dob, gender };
            };

            window.manualVerifyAadhaar = async (num) => {
                try { await navigator.clipboard.writeText(num); } catch(e) {}
                window.open("https://myaadhaar.uidai.gov.in/check-aadhaar-validity/en", "_blank");
                return true;
            };

            window.bridgeReady = true;
            console.log("JS Bridge fully initialized.");
        </script>
    </body>
</html>
